name: Process Books

on:
  push:
    paths:
      - 'books/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Process epubs
        run: node scripts/process-books.mjs

      - name: Commit generated data
        run: |
          git config user.name "Library Bot"
          git config user.email "library-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: process books [skip ci]"
          git push
